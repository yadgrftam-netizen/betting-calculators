<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betting Calculator</title>

<style>
  body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
  }

  @media (max-width: 600px) {
    body { padding: 10px; font-size: 16px; }
    button, select, input { width: 100%; margin-top: 10px; }
    #nextBetBox { flex-direction: column; align-items: flex-start; }
  }

  body.light { background: #ffffff; color: #000000; }
  body.dark { background: #1a1a1a; color: #ffffff; }

  #themeToggle {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    background: #444;
    color: white;
  }

  select, input {
    padding: 10px;
    font-size: 16px;
    margin-top: 15px;
    border-radius: 8px;
    width: 100%;
  }

  #total, #nextBetBox {
    font-size: 28px;
    font-weight: bold;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #copyBtn {
    padding: 8px 12px;
    font-size: 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #007bff;
    color: white;
    transition: background-color 0.3s;
  }

  #winBtn, #lostBtn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  #winBtn { background: #28a745; color: white; }
  #lostBtn { background: #dc3545; color: white; }

  /* ⭐ دکمه‌های افقی */
  #buttonRow {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  #buttonRow button {
    flex: 1;
  }
</style>
</head>

<body class="light">

<h2>Betting Calculator</h2>

<select id="calcType">
  <option value="martingale">Martingale</option>
  <option value="fibonacci">Fibonacci</option>
  <option value="dalembert">D'Alembert</option>
  <option value="oscar">Oscar's Grind</option>
  <option value="labouchere">Labouchere</option>
</select>

<select id="currency">
  <option value="USDT">USDT - Tether</option>
  <option value="TRX">TRX - Tron</option>
  <option value="Toman">IR - Toman</option>
  <option value="Rial">IR - Rial</option>
</select>

<input id="baseBet" type="number" step="0.01" value="0.05" placeholder="Enter base bet">

<div id="nextBetBox">
  <span id="nextBet">Next Bet: 0.05</span>
  <button id="copyBtn">Copy</button>
</div>

<p id="total">Total: 0</p>

<!-- ⭐ دکمه‌های افقی -->
<div id="buttonRow">
  <button id="winBtn">Win</button>
  <button id="lostBtn">Loss</button>
  <button id="themeToggle">Night Mode</button>
  <button id="copyBtn">Copy</button>
</div>

<script>
  const themeToggle = document.getElementById("themeToggle");
  themeToggle.onclick = () => {
    if (document.body.className === "light") {
      document.body.className = "dark";
      themeToggle.innerText = "Day Mode";
    } else {
      document.body.className = "light";
      themeToggle.innerText = "Night Mode";
    }
  };

  let total = 0;

  const nextBetText = document.getElementById("nextBet");
  const totalText = document.getElementById("total");
  const calcType = document.getElementById("calcType");
  const currency = document.getElementById("currency");
  const baseBetInput = document.getElementById("baseBet");
  const copyBtn = document.getElementById("copyBtn");

  let currentBet = parseFloat(baseBetInput.value);

  let fibA = currentBet;
  let fibB = currentBet;

  let dalUnit = currentBet;

  let oscarProfit = 0;

  let labList = [1, 2, 3];

  function formatNumber(num) {
    if (currency.value === "Toman" || currency.value === "Rial") {
      return Math.round(num);
    }
    return num.toFixed(2);
  }

  function updateDisplay(bet) {
    nextBetText.innerText = "Next Bet: " + currency.value + " " + formatNumber(bet);
    totalText.innerText = "Total: " + currency.value + " " + formatNumber(total);
  }

  function resetAll() {
    let base = parseFloat(baseBetInput.value) || 0;
    currentBet = base;

    fibA = base;
    fibB = base;

    dalUnit = base;

    oscarProfit = 0;

    labList = [1, 2, 3];

    total = 0;
    updateDisplay(base);
  }

  baseBetInput.addEventListener("input", resetAll);

  document.getElementById("winBtn").onclick = () => {
    let base = parseFloat(baseBetInput.value) || 0;

    if (calcType.value === "dalembert") {
      currentBet = Math.max(base, currentBet - dalUnit);
    }

    if (calcType.value === "oscar") {
      oscarProfit += currentBet;
      if (oscarProfit >= base) {
        oscarProfit = 0;
        currentBet = base;
      } else {
        currentBet += base;
      }
    }

    if (calcType.value === "labouchere") {
      if (labList.length > 1) {
        labList.shift();
        labList.pop();
      } else {
        labList = [1, 2, 3];
      }
      currentBet = labList[0] + labList[labList.length - 1];
    }

    total = 0;
    updateDisplay(currentBet);
  };

  document.getElementById("lostBtn").onclick = () => {
    let base = parseFloat(baseBetInput.value) || 0;

    if (calcType.value === "martingale") {
      currentBet *= 2;
    }

    else if (calcType.value === "fibonacci") {
      let next = fibA + fibB;
      fibB = fibA;
      fibA = next;
      currentBet = next;
    }

    else if (calcType.value === "dalembert") {
      currentBet += dalUnit;
    }

    else if (calcType.value === "labouchere") {
      labList.push(currentBet);
      currentBet = labList[0] + labList[labList.length - 1];
    }

    total += currentBet;
    updateDisplay(currentBet);
  };

  copyBtn.onclick = () => {
    let fullText = nextBetText.innerText;
    fullText = fullText.replace("Next Bet: ", "");
    let parts = fullText.split(" ");
    let numberOnly = parts[1];
    navigator.clipboard.writeText(numberOnly);

    copyBtn.innerText = "Copied!";
    copyBtn.style.backgroundColor = "#ffcc00";

    setTimeout(() => {
      copyBtn.style.backgroundColor = "#007bff";
      copyBtn.innerText = "Copy";
    }, 1000);
  };

  updateDisplay(currentBet);
</script>

</body>
</html>
