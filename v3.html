<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جدول بیسیک استراتژی بلک‌جک</title>
    <style>
        * { font-family: 'Vazir', 'Segoe UI', Tahoma, sans-serif; box-sizing: border-box; }
        body {
            background: #1a472a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: #0d2b1a;
            color: #f5e6c8;
            padding: 25px 20px 30px;
            border-radius: 28px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.7);
            border: 2px solid #c9a050;
            text-align: center;
        }
        h1 {
            font-size: 1.7rem;
            color: #f5d742;
            margin-top: 0;
            margin-bottom: 8px;
            text-shadow: 0 2px 5px #00000055;
        }
        .sub {
            color: #bbd9b5;
            margin-bottom: 25px;
            font-size: 0.95rem;
            border-bottom: 1px dashed #5f7e5a;
            padding-bottom: 12px;
        }
        .selector-group {
            background: #1f402a;
            padding: 18px 12px;
            border-radius: 18px;
            margin-bottom: 20px;
            border: 1px solid #4e7546;
        }
        .selector-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px 20px;
            margin: 12px 0;
        }
        .selector-row label {
            font-weight: bold;
            color: #f0e1b0;
            min-width: 70px;
        }
        select {
            padding: 8px 15px;
            border-radius: 40px;
            border: none;
            background: #f5f0e0;
            color: #1d3d1d;
            font-weight: bold;
            font-size: 1rem;
            min-width: 110px;
            cursor: pointer;
            outline: 2px solid #c9a050;
        }
        select:focus {
            outline: 3px solid #f5d742;
        }
        .result-box {
            background: #0e1f12;
            border-radius: 60px;
            padding: 18px 15px;
            margin: 20px 0 15px;
            border: 2px solid #c9a050;
            box-shadow: inset 0 0 15px #00000077;
        }
        .action {
            font-size: 2.5rem;
            font-weight: 900;
            color: #f5d742;
            text-shadow: 0 0 20px #f5b74288;
            letter-spacing: 3px;
        }
        .action-desc {
            font-size: 0.9rem;
            color: #b8d0b0;
            margin-top: 5px;
        }
        .note {
            background: #162b1b;
            padding: 12px 15px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #c5dbbd;
            border-right: 5px solid #f5d742;
            text-align: right;
        }
        .note strong {
            color: #f5d742;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6f8f6a;
        }
        @media (max-width: 500px) {
            h1 { font-size: 1.3rem; }
            .selector-row { gap: 10px; }
            select { min-width: 90px; }
            .action { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>♠️ جدول بیسیک استراتژی ♥️</h1>
    <div class="sub">تصمیم‌گیری بر اساس دست شما و کارت آشکار دیلر</div>

    <div class="selector-group">
        <div class="selector-row">
            <label for="playerHand">🃏 دست شما:</label>
            <select id="playerHand">
                <option value="hard8">سخت ۸</option>
                <option value="hard9">سخت ۹</option>
                <option value="hard10">سخت ۱۰</option>
                <option value="hard11">سخت ۱۱</option>
                <option value="hard12">سخت ۱۲</option>
                <option value="hard13">سخت ۱۳</option>
                <option value="hard14">سخت ۱۴</option>
                <option value="hard15">سخت ۱۵</option>
                <option value="hard16" selected>سخت ۱۶</option>
                <option value="hard17">سخت ۱۷+</option>
                <option value="soft13">نرم ۱۳-۱۴</option>
                <option value="soft15">نرم ۱۵-۱۶</option>
                <option value="soft17">نرم ۱۷</option>
                <option value="soft18">نرم ۱۸</option>
                <option value="soft19">نرم ۱۹+</option>
                <option value="pair2">جفت ۲,۲</option>
                <option value="pair3">جفت ۳,۳</option>
                <option value="pair4">جفت ۴,۴</option>
                <option value="pair5">جفت ۵,۵</option>
                <option value="pair6">جفت ۶,۶</option>
                <option value="pair7">جفت ۷,۷</option>
                <option value="pair8">جفت ۸,۸</option>
                <option value="pair9">جفت ۹,۹</option>
                <option value="pair10">جفت ۱۰,۱۰</option>
                <option value="pairA">جفت آس</option>
            </select>
        </div>

        <div class="selector-row">
            <label for="dealerCard">🎴 کارت دیلر:</label>
            <select id="dealerCard">
                <option value="2">۲</option>
                <option value="3">۳</option>
                <option value="4">۴</option>
                <option value="5">۵</option>
                <option value="6" selected>۶</option>
                <option value="7">۷</option>
                <option value="8">۸</option>
                <option value="9">۹</option>
                <option value="10">۱۰</option>
                <option value="A">آس</option>
            </select>
        </div>
    </div>

    <div class="result-box" id="resultBox">
        <div class="action" id="actionDisplay">ایست</div>
        <div class="action-desc" id="actionDesc">توصیه: دست خود را نگه دارید</div>
    </div>

    <div class="note" id="noteDisplay">
        <strong>💡 نکته:</strong> اگر دست شما <strong>سخت ۱۶</strong> و دیلر <strong>۶</strong> دارد، بهترین تصمیم <strong>ایستادن</strong> است.
    </div>
    <div class="footer">بر اساس قوانین استاندارد (دک ۶ کارتی) • فقط برای آموزش</div>
</div>

<script>
    // ============================================================
    // دیکشنری تصمیمات برای هر حالت (H=Hit, S=Stand, D=Double, P=Split)
    // ============================================================
    const strategy = {
        // دست‌های سخت (Hard)
        hard8:  { 2:'H',3:'H',4:'H',5:'H',6:'H',7:'H',8:'H',9:'H',10:'H',A:'H' },
        hard9:  { 2:'D',3:'D',4:'D',5:'D',6:'D',7:'H',8:'H',9:'H',10:'H',A:'H' },
        hard10: { 2:'D',3:'D',4:'D',5:'D',6:'D',7:'D',8:'D',9:'D',10:'H',A:'H' },
        hard11: { 2:'D',3:'D',4:'D',5:'D',6:'D',7:'D',8:'D',9:'D',10:'D',A:'H' },
        hard12: { 2:'H',3:'H',4:'S',5:'S',6:'S',7:'H',8:'H',9:'H',10:'H',A:'H' },
        hard13: { 2:'S',3:'S',4:'S',5:'S',6:'S',7:'H',8:'H',9:'H',10:'H',A:'H' },
        hard14: { 2:'S',3:'S',4:'S',5:'S',6:'S',7:'H',8:'H',9:'H',10:'H',A:'H' },
        hard15: { 2:'S',3:'S',4:'S',5:'S',6:'S',7:'H',8:'H',9:'H',10:'H',A:'H' },
        hard16: { 2:'S',3:'S',4:'S',5:'S',6:'S',7:'H',8:'H',9:'H',10:'H',A:'H' },
        hard17: { 2:'S',3:'S',4:'S',5:'S',6:'S',7:'S',8:'S',9:'S',10:'S',A:'S' },

        // دست‌های نرم (Soft)
        soft13: { 2:'H',3:'H',4:'H',5:'D',6:'D',7:'H',8:'H',9:'H',10:'H',A:'H' },
        soft15: { 2:'H',3:'H',4:'D',5:'D',6:'D',7:'H',8:'H',9:'H',10:'H',A:'H' },
        soft17: { 2:'D',3:'D',4:'D',5:'D',6:'D',7:'H',8:'H',9:'H',10:'H',A:'H' },
        soft18: { 2:'D',3:'D',4:'D',5:'D',6:'D',7:'S',8:'S',9:'H',10:'H',A:'H' },
        soft19: { 2:'S',3:'S',4:'S',5:'S',6:'S',7:'S',8:'S',9:'S',10:'S',A:'S' },

        // جفت‌ها (Pairs)
        pair2:  { 2:'P',3:'P',4:'P',5:'P',6:'P',7:'P',8:'H',9:'H',10:'H',A:'H' },
        pair3:  { 2:'P',3:'P',4:'P',5:'P',6:'P',7:'P',8:'H',9:'H',10:'H',A:'H' },
        pair4:  { 2:'H',3:'H',4:'H',5:'P',6:'P',7:'H',8:'H',9:'H',10:'H',A:'H' },
        pair5:  { 2:'D',3:'D',4:'D',5:'D',6:'D',7:'D',8:'D',9:'D',10:'H',A:'H' },
        pair6:  { 2:'P',3:'P',4:'P',5:'P',6:'P',7:'H',8:'H',9:'H',10:'H',A:'H' },
        pair7:  { 2:'P',3:'P',4:'P',5:'P',6:'P',7:'P',8:'H',9:'H',10:'H',A:'H' },
        pair8:  { 2:'P',3:'P',4:'P',5:'P',6:'P',7:'P',8:'P',9:'P',10:'P',A:'P' },
        pair9:  { 2:'P',3:'P',4:'P',5:'P',6:'P',7:'S',8:'P',9:'P',10:'S',A:'S' },
        pair10: { 2:'S',3:'S',4:'S',5:'S',6:'S',7:'S',8:'S',9:'S',10:'S',A:'S' },
        pairA:  { 2:'P',3:'P',4:'P',5:'P',6:'P',7:'P',8:'P',9:'P',10:'P',A:'P' },
    };

    // توضیحات نمایشی برای هر تصمیم
    const actionDescMap = {
        'H': '💥 بزنید (Hit) – کارت دیگری بگیرید',
        'S': '🛑 ایست کنید (Stand) – دست خود را نگه دارید',
        'D': '⬆️ دوبرابر کنید (Double) – شرط را دو برابر و یک کارت بگیرید',
        'P': '✂️ تقسیم کنید (Split) – دو دست جداگانه بسازید'
    };

    // نکات ویژه برای نمایش در پایین
    const noteMap = {
        'hard16_6': '💡 دقیقاً مثال شما: با <strong>سخت ۱۶</strong> برابر <strong>۶</strong> دیلر، بهترین تصمیم <strong>ایستادن</strong> است (چون دیلر ضعیف است).',
        'hard16_10': '⚠️ با <strong>سخت ۱۶</strong> برابر <strong>۱۰</strong> دیلر، باید <strong>بزنید</strong> هر چند ریسک بالاست.',
    };
    function getNoteKey(playerVal, dealerVal) {
        return playerVal + '_' + dealerVal;
    }

    // ============================================================
    // منطق اصلی بروزرسانی
    // ============================================================
    function updateStrategy() {
        const playerSelect = document.getElementById('playerHand');
        const dealerSelect = document.getElementById('dealerCard');
        const actionDisplay = document.getElementById('actionDisplay');
        const actionDesc = document.getElementById('actionDesc');
        const noteDisplay = document.getElementById('noteDisplay');

        const playerKey = playerSelect.value;
        const dealerKey = dealerSelect.value;

        // دریافت تصمیم از دیکشنری
        const action = (strategy[playerKey] && strategy[playerKey][dealerKey]) ? strategy[playerKey][dealerKey] : 'S';
        
        // نمایش حرف بزرگ
        actionDisplay.textContent = actionDescMap[action] ? action.split('')[0] : 'ایست';
        actionDesc.textContent = actionDescMap[action] || 'نگه دارید';

        // نمایش نکته ویژه
        const noteKey = getNoteKey(playerKey, dealerKey);
        if (noteMap[noteKey]) {
            noteDisplay.innerHTML = noteMap[noteKey];
        } else {
            // نکته عمومی
            let playerName = playerSelect.options[playerSelect.selectedIndex].text;
            let dealerName = dealerSelect.options[dealerSelect.selectedIndex].text;
            noteDisplay.innerHTML = `🔹 بر اساس دست <strong>${playerName}</strong> و کارت دیلر <strong>${dealerName}</strong>، تصمیم <strong>${actionDescMap[action] || 'ایست'}</strong> توصیه می‌شود.`;
        }
    }

    // اتصال رویدادها
    document.getElementById('playerHand').addEventListener('change', updateStrategy);
    document.getElementById('dealerCard').addEventListener('change', updateStrategy);

    // اجرا در ابتدا برای نمایش حالت پیش‌فرض (سخت ۱۶ و دیلر ۶)
    window.onload = updateStrategy;
</script>
</body>
                                               </html>
